<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>KnitKit Knitter</title>
    <style>:root {
  color-scheme: dark;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
  background: #050506;
  color: #f5f5f7;
  --page: #050506;
  --panel: rgba(22, 22, 25, 0.74);
  --panel-strong: rgba(11, 11, 13, 0.88);
  --line: rgba(255, 255, 255, 0.12);
  --line-strong: rgba(255, 255, 255, 0.2);
  --text-soft: #a1a1a6;
  --text-muted: #77777d;
  --blue: #2997ff;
  --blue-strong: #0077ed;
  --green: #30d158;
  --silver: #f5f5f7;
  --control: rgba(255, 255, 255, 0.09);
  --control-strong: rgba(255, 255, 255, 0.16);
  --shadow: 0 24px 80px rgba(0, 0, 0, 0.46);
  --mono: "SF Mono", "SFMono-Regular", ui-monospace, Menlo, Consolas, monospace;
}

* {
  box-sizing: border-box;
}

[hidden] {
  display: none !important;
}

body {
  margin: 0;
  min-height: 100vh;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.14) 0, rgba(255, 255, 255, 0) 270px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
    linear-gradient(180deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
    #050506;
  background-size: auto, 48px 48px, 48px 48px, auto;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    linear-gradient(115deg, rgba(255, 255, 255, 0.18), transparent 22%),
    linear-gradient(245deg, rgba(41, 151, 255, 0.18), transparent 34%);
  opacity: 0.7;
  mask-image: linear-gradient(#000, transparent 72%);
}

button,
input,
textarea,
a.button {
  font: inherit;
}

.shell {
  height: 100vh;
  height: 100dvh;
  display: grid;
  grid-template-rows: auto minmax(0, 1fr);
  overflow: hidden;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 10px clamp(16px, 3vw, 36px);
  border-bottom: 1px solid var(--line);
  background: rgba(5, 5, 6, 0.72);
  backdrop-filter: blur(24px) saturate(160%);
  position: sticky;
  top: 0;
  z-index: 2;
}

.brand {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.brand strong {
  font-size: 22px;
  line-height: 1;
  font-weight: 780;
  letter-spacing: 0;
  background: linear-gradient(180deg, #ffffff, #b8b8bf);
  -webkit-background-clip: text;
  color: transparent;
}

.brand span {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0;
}

.brand-row {
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.brand span,
.hint,
.meta {
  color: var(--text-soft);
}

.hint {
  font-family: var(--mono);
  padding: 6px 10px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.075);
  font-size: 13px;
  font-weight: 600;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
}

.top-status {
  display: flex;
  align-items: center;
  gap: 10px;
}

.lamp-dot {
  width: 10px;
  height: 10px;
  display: inline-block;
  flex: 0 0 auto;
  border-radius: 999px;
  background: #6e6e73;
  box-shadow:
    0 0 0 4px rgba(255, 255, 255, 0.055),
    0 0 16px rgba(255, 255, 255, 0.08);
}

.lamp-dot[data-tone="busy"] {
  background: var(--blue);
  box-shadow:
    0 0 0 4px rgba(41, 151, 255, 0.13),
    0 0 16px rgba(41, 151, 255, 0.45);
}

.lamp-dot[data-tone="ok"] {
  background: var(--green);
  box-shadow:
    0 0 0 4px rgba(48, 209, 88, 0.13),
    0 0 16px rgba(48, 209, 88, 0.48);
}

.lamp-dot[data-tone="warn"] {
  background: #ffd60a;
  box-shadow:
    0 0 0 4px rgba(255, 214, 10, 0.13),
    0 0 16px rgba(255, 214, 10, 0.45);
}

.workspace {
  position: relative;
  width: min(1700px, calc(100vw - 40px));
  margin: 0 auto;
  min-height: 0;
  height: 100%;
  padding: 18px 0;
  display: grid;
  grid-template-columns: minmax(420px, 500px) minmax(0, 1fr);
  gap: 22px;
  align-items: stretch;
}

.panel,
.stage {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
  box-shadow: var(--shadow);
  backdrop-filter: blur(28px) saturate(150%);
}

.panel::before,
.stage::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
}

.panel {
  position: relative;
  min-height: 0;
  height: 100%;
  padding: 22px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  overflow: auto;
  scrollbar-width: thin;
  scrollbar-color: rgba(255, 255, 255, 0.24) transparent;
}

.panel::-webkit-scrollbar {
  width: 8px;
}

.panel::-webkit-scrollbar-thumb {
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.22);
}

.stage {
  position: relative;
  min-height: 0;
  height: 100%;
  padding: clamp(18px, 3vw, 34px);
  display: grid;
  place-items: center;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02)),
    var(--panel-strong);
  overflow: hidden;
}

.stage::before {
  background:
    linear-gradient(90deg, rgba(255, 255, 255, 0.045) 1px, transparent 1px),
    linear-gradient(180deg, rgba(255, 255, 255, 0.045) 1px, transparent 1px);
  background-size: 36px 36px;
  opacity: 0.28;
}

.stage:fullscreen {
  padding: 2vmin;
  border: 0;
  border-radius: 0;
  background: #050506;
  box-shadow: none;
}

.stage:fullscreen::before {
  display: none;
}

.stage:fullscreen canvas#swatch {
  max-width: 96vmin;
  max-height: 96vmin;
  border-width: 12px;
}

.lamp-mini {
  position: absolute;
  width: 1px;
  height: 1px;
  opacity: 0.01;
  pointer-events: none;
}

.field {
  display: grid;
  gap: 8px;
}

.setup-grid,
.dashboard {
  display: grid;
  gap: 8px;
}

.setup-grid[hidden] {
  display: none;
}

.control-grid,
.repair-grid {
  display: grid;
  gap: 18px;
}

.control-grid.compact {
  gap: 8px;
}

.control-grid {
  grid-template-columns: 1fr;
}

.repair-grid {
  grid-template-columns: 1fr;
  align-items: start;
}

.section-title {
  margin-top: 2px;
  font-family: var(--mono);
  color: rgba(245, 245, 247, 0.72);
  font-size: 12px;
  font-weight: 760;
  letter-spacing: 0;
}

.guide {
  font-family: var(--mono);
  padding: 8px 10px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.105), rgba(255, 255, 255, 0.045));
  color: #d2d2d7;
  font-size: 11px;
  line-height: 1.32;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
}

.flow {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 8px;
  margin: 0;
  padding: 0;
  list-style: none;
}

.flow li {
  display: grid;
  grid-template-columns: 24px 1fr;
  column-gap: 8px;
  align-items: center;
  min-height: 58px;
  padding: 9px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.052);
  color: var(--text-muted);
}

.flow li span {
  width: 24px;
  height: 24px;
  display: grid;
  place-items: center;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.08);
  color: var(--text-soft);
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 760;
}

.flow li strong,
.flow li em {
  font-family: var(--mono);
  font-style: normal;
  letter-spacing: 0;
}

.flow li strong {
  color: inherit;
  font-size: 11px;
  font-weight: 760;
}

.flow li em {
  grid-column: 1 / -1;
  margin-top: 2px;
  color: inherit;
  font-size: 10px;
  line-height: 1.25;
}

.flow li.done {
  color: #73737a;
  background: rgba(255, 255, 255, 0.032);
}

.flow li.done span {
  color: #73737a;
  background: rgba(255, 255, 255, 0.055);
}

.flow li.active {
  color: #f5f5f7;
  border-color: rgba(48, 209, 88, 0.58);
  background:
    linear-gradient(180deg, rgba(48, 209, 88, 0.18), rgba(48, 209, 88, 0.055));
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.08),
    0 0 0 4px rgba(48, 209, 88, 0.08);
}

.flow li.active span {
  color: #031207;
  background: var(--green);
}

.status-note {
  display: grid;
  gap: 5px;
  padding: 10px;
  border: 1px solid rgba(48, 209, 88, 0.28);
  border-radius: 8px;
  background:
    linear-gradient(180deg, rgba(48, 209, 88, 0.1), rgba(48, 209, 88, 0.03));
}

.status-note strong,
.status-note span {
  display: block;
  min-width: 0;
  font-family: var(--mono);
  letter-spacing: 0;
}

.status-note strong {
  color: #f5f5f7;
  font-size: 14px;
  line-height: 1.25;
}

.status-note span {
  color: #c7c7cc;
  font-size: 11px;
  line-height: 1.45;
}

.setting-card,
.dashboard-item {
  min-width: 0;
  padding: 10px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.052);
  color: var(--text-muted);
}

.dashboard {
  grid-template-columns: repeat(4, minmax(0, 1fr));
  grid-auto-flow: row;
}

.dashboard-item {
  height: 58px;
  overflow: hidden;
}

.dashboard-item.dashboard-wide {
  grid-column: span 2;
}

.dashboard-item.with-stepper {
  padding: 8px;
}

.dashboard-label {
  grid-column: 1 / -1;
  margin-top: 4px;
  font-family: var(--mono);
  color: rgba(245, 245, 247, 0.62);
  font-size: 10px;
  font-weight: 760;
  letter-spacing: 0;
}

.dashboard-label:first-child {
  margin-top: 0;
}

.dashboard-name {
  grid-column: 1 / -1;
  display: block;
  min-width: 0;
  margin-bottom: 2px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-family: var(--mono);
  color: #f5f5f7;
  font-size: 15px;
  line-height: 1.25;
  font-weight: 760;
  letter-spacing: 0;
}

.dashboard-item span {
  display: block;
  min-width: 0;
  font-family: var(--mono);
  letter-spacing: 0;
  color: var(--text-muted);
  font-size: 10px;
  font-weight: 760;
}

.dashboard-item strong {
  display: block;
  min-width: 0;
  font-family: var(--mono);
  letter-spacing: 0;
  margin-top: 5px;
  color: #f5f5f7;
  font-size: 12px;
  line-height: 1.24;
  font-weight: 760;
  overflow-wrap: anywhere;
}

.stepper {
  margin-top: 4px;
  display: grid;
  grid-template-columns: 22px minmax(0, 1fr) 22px;
  gap: 5px;
  align-items: center;
}

.stepper strong {
  margin-top: 0;
  text-align: center;
  white-space: nowrap;
}

.stepper-button {
  min-height: 22px;
  height: 22px;
  padding: 0;
  border-radius: 6px;
  box-shadow:
    inset 0 0 0 1px var(--line),
    inset 0 1px 0 rgba(255, 255, 255, 0.08);
  background: var(--control);
  color: #f5f5f7;
  font-size: 13px;
  line-height: 1;
}

.stepper-button:hover {
  background: var(--control-strong);
  transform: none;
}

.assistive {
  position: absolute;
  width: 1px;
  height: 1px;
  overflow: hidden;
  clip: rect(0 0 0 0);
  white-space: nowrap;
}

.cycle {
  display: grid;
  gap: 7px;
  padding: 8px;
  border: 1px solid rgba(48, 209, 88, 0.22);
  border-radius: 8px;
  background:
    linear-gradient(180deg, rgba(48, 209, 88, 0.08), rgba(48, 209, 88, 0.025));
}

.cycle-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 10px;
}

.cycle-head strong,
.cycle-head span,
.cycle-track span {
  font-family: var(--mono);
  letter-spacing: 0;
}

.cycle-head strong {
  color: #f5f5f7;
  font-size: 11px;
  font-weight: 760;
}

.cycle-head span {
  color: var(--text-soft);
  font-size: 10px;
  text-align: right;
}

.cycle-track {
  display: grid;
  grid-template-columns: 1fr 18px 1fr 18px 1fr 18px 1fr;
  align-items: center;
  gap: 5px;
}

.cycle-track span {
  min-height: 28px;
  display: grid;
  place-items: center;
  padding: 5px 6px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.055);
  color: var(--text-muted);
  font-size: 10px;
  font-weight: 700;
  text-align: center;
}

.cycle-track span.active {
  color: #031207;
  border-color: rgba(48, 209, 88, 0.86);
  background: var(--green);
  box-shadow: 0 0 0 4px rgba(48, 209, 88, 0.1);
}

.cycle-track span.done {
  color: #73737a;
  background: rgba(255, 255, 255, 0.035);
}

.cycle-track i {
  width: 18px;
  height: 1px;
  display: block;
  position: relative;
  background: rgba(255, 255, 255, 0.24);
}

.cycle-track i::after {
  content: "";
  position: absolute;
  top: -3px;
  right: 0;
  width: 7px;
  height: 7px;
  border-top: 1px solid rgba(255, 255, 255, 0.32);
  border-right: 1px solid rgba(255, 255, 255, 0.32);
  transform: rotate(45deg);
}

.field label,
.metric strong {
  font-family: var(--mono);
  color: #f5f5f7;
  font-size: 11px;
  font-weight: 680;
}

input[type="file"] {
  font-family: var(--mono);
  width: 100%;
  padding: 6px;
  border: 1px solid var(--line-strong);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.07);
  color: #f5f5f7;
}

input[type="file"]::file-selector-button {
  margin-right: 10px;
  border: 0;
  border-radius: 8px;
  padding: 5px 8px;
  background: var(--control);
  color: #f5f5f7;
  font: inherit;
  font-weight: 650;
}

input[type="text"],
select {
  font-family: var(--mono);
  width: 100%;
  padding: 6px 8px;
  border: 1px solid var(--line-strong);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.075);
  color: #f5f5f7;
  outline: none;
}

select {
  appearance: none;
}

.task-panel {
  display: grid;
  gap: 8px;
}

.task-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 92px 92px;
  gap: 8px;
  align-items: center;
}

input[type="range"] {
  width: 100%;
  accent-color: var(--blue);
}

.row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.actions.trio {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.actions.quartet {
  grid-template-columns: repeat(4, minmax(0, 1fr));
}

button,
a.button {
  font-family: var(--mono);
  border: 0;
  border-radius: 8px;
  padding: 12px 16px;
  min-height: 46px;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.18), transparent),
    var(--blue);
  color: #fff;
  text-decoration: none;
  text-align: center;
  cursor: pointer;
  font-weight: 680;
  box-shadow: 0 12px 28px rgba(41, 151, 255, 0.26);
  transition: background 140ms ease, transform 140ms ease, box-shadow 140ms ease;
}

button:hover,
a.button:hover {
  background: var(--blue-strong);
  transform: translateY(-1px);
}

button.secondary {
  background: var(--control);
  color: #f5f5f7;
  box-shadow:
    inset 0 0 0 1px var(--line),
    inset 0 1px 0 rgba(255, 255, 255, 0.08);
}

button.secondary:hover {
  background: var(--control-strong);
}

button:disabled,
a.button:not([href]) {
  opacity: 0.36;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

.metrics {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.metrics.three {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.metric {
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.11), rgba(255, 255, 255, 0.045));
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
}

.metric span {
  font-family: var(--mono);
  display: block;
  margin-top: 4px;
  color: var(--silver);
  font-size: 25px;
  line-height: 1.08;
  font-weight: 760;
  font-variant-numeric: tabular-nums;
}

progress {
  width: 100%;
  height: 8px;
  accent-color: var(--blue);
}

canvas#swatch {
  width: auto;
  max-width: 980px;
  max-width: min(100%, calc(100dvh - 150px), 980px);
  max-height: min(100%, calc(100dvh - 150px), 980px);
  height: auto;
  image-rendering: pixelated;
  position: relative;
  z-index: 1;
  border: 8px solid #f5f5f7;
  border-radius: 8px;
  box-shadow:
    0 0 0 1px rgba(255, 255, 255, 0.16),
    0 34px 80px rgba(0, 0, 0, 0.56);
}

.camera {
  width: min(100%, calc(100dvh - 150px), 900px);
  max-width: none;
  aspect-ratio: 1;
  position: relative;
  overflow: hidden;
  border-radius: 8px;
  background: #1c1c1e;
  box-shadow:
    0 0 0 1px rgba(255, 255, 255, 0.12),
    0 34px 80px rgba(0, 0, 0, 0.56);
  z-index: 1;
}

.camera video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.reticle {
  position: absolute;
  inset: 10%;
  border: 2px solid rgba(255, 255, 255, 0.92);
  border-radius: 8px;
  box-shadow: 0 0 0 999px rgba(0, 0, 0, 0.18);
  pointer-events: none;
}

.result {
  width: 100%;
  margin-top: 16px;
  display: grid;
  gap: 12px;
}

textarea {
  font-family: var(--mono);
  width: 100%;
  min-height: 180px;
  resize: vertical;
  border: 1px solid var(--line-strong);
  border-radius: 8px;
  padding: 8px;
  background: rgba(255, 255, 255, 0.075);
  color: #f5f5f7;
  outline: none;
}

textarea.compact {
  min-height: 78px;
  font-size: 12px;
}

.tiny {
  overflow-wrap: anywhere;
  font-size: 11px;
}

input[type="text"]:focus,
textarea:focus {
  border-color: rgba(41, 151, 255, 0.78);
  box-shadow: 0 0 0 4px rgba(41, 151, 255, 0.16);
}

@media (max-width: 820px) {
  .shell {
    height: auto;
    min-height: 100vh;
    min-height: 100dvh;
    overflow: visible;
  }

  .workspace {
    grid-template-columns: 1fr;
    width: min(100vw - 20px, 560px);
    padding: 14px 0 24px;
    gap: 14px;
  }

  .stage {
    min-height: auto;
  }

  .topbar {
    padding: 13px 14px;
  }

  .panel {
    padding: 14px;
    height: auto;
    overflow: visible;
  }

  .metrics.three {
    grid-template-columns: 1fr 1fr 1fr;
  }

  .control-grid,
  .repair-grid {
    grid-template-columns: 1fr;
  }

  .camera,
  canvas#swatch {
    width: min(100%, 82vw);
    max-width: min(100%, 82vw);
    max-height: none;
  }

  .flow,
  .dashboard,
  .actions.quartet {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

}
</style>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <strong>KnitKit</strong>
          <span class="brand-row">
            <span>Knitter</span>
            <span id="lightStatus" class="lamp-dot" data-tone="idle" title="等待页面交互后自动请求亮屏" aria-label="亮屏：等待页面交互后自动请求亮屏"></span>
          </span>
        </div>
        <div class="top-status">
          <span id="status" class="hint">等待选择</span>
          <span id="lightDetail" class="assistive">等待页面交互后自动请求亮屏。</span>
        </div>
      </header>

      setupPositionProbePattern(_moduleCount - 7, 0);
      setupPositionProbePattern(0, _moduleCount - 7);

        for (var c = -1; c <= 7; c += 1) {

        var lostPoint = QRUtil.getLostPoint(_this);

        if (i == 0 || minLostPoint > lostPoint) {
          minLostPoint = lostPoint;
          pattern = i;
        }

    };

    var setupTimingPattern = function() {

      for (var r = 8; r < _moduleCount - 8; r += 1) {
        if (_modules[r][6] != null) {
          continue;
        }
        _modules[r][6] = (r % 2 == 0);
      }

      for (var c = 8; c < _moduleCount - 8; c += 1) {
        if (_modules[6][c] != null) {
          continue;
        }
        _modules[6][c] = (c % 2 == 0);
      }
    };

    var setupPositionAdjustPattern = function() {

      var pos = QRUtil.getPatternPosition(_typeNumber);

      for (var i = 0; i < pos.length; i += 1) {

        for (var j = 0; j < pos.length; j += 1) {

          var row = pos[i];
          var col = pos[j];

          if (_modules[row][col] != null) {
            continue;
          }

          for (var r = -2; r <= 2; r += 1) {

            for (var c = -2; c <= 2; c += 1) {

                  || (r == 0 && c == 0) ) {

      var bits = QRUtil.getBCHTypeNumber(_typeNumber);

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);

      for (var i = 0; i < 15; i += 1) {

            if (_modules[row][col - c] == null) {

              if (byteIndex < data.length) {

              var mask = maskFunc(row, col - c);

              bitIndex -= 1;

                bitIndex = 7;

    var createBytes = function(buffer, rsBlocks) {

      var offset = 0;

      var maxDcCount = 0;
      var maxEcCount = 0;

      var dcdata = new Array(rsBlocks.length);

      for (var i = 0; i < rsBlocks.length; i += 1) {

      var index = 0;

      for (var i = 0; i < maxDcCount; i += 1) {

            index += 1;
          }
        }

      for (var i = 0; i < maxEcCount; i += 1) {

            index += 1;

    var createData = function(typeNumber, errorCorrectionLevel, dataList) {

      var buffer = qrBitBuffer();

      for (var i = 0; i < dataList.length; i += 1) {
        var data = dataList[i];

        buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
        data.write(buffer);

      // calc num max data.
      var totalDataCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalDataCount += rsBlocks[i].dataCount;
      }

      if (buffer.getLengthInBits() > totalDataCount * 8) {
        throw 'code length overflow. ('
          + buffer.getLengthInBits()
          + '>'
          + totalDataCount * 8
          + ')';
      }

      // end code
      if (buffer.getLengthInBits() + 4 <= totalDataCount * 8) {
        buffer.put(0, 4);
      }

      // padding
      while (buffer.getLengthInBits() % 8 != 0) {
        buffer.putBit(false);
      }

      // padding
      while (true) {

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD0, 8);

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD1, 8);
      }

      return createBytes(buffer, rsBlocks);

        break;
      case 'Alphanumeric' :
        newData = qrAlphaNum(data);
        break;
      case 'Byte' :
        newData = qr8BitByte(data);
        break;
      case 'Kanji' :
        newData = qrKanji(data);
        break;
      default :
        throw 'mode:' + mode;

      _dataList.push(newData);
      _dataCache = null;

            buffer.put(data.getMode(), 4);
            buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
            data.write(buffer);
          }

          var totalDataCount = 0;
          for (var i = 0; i < rsBlocks.length; i++) {

          }

      qrHtml += ' border-collapse: collapse;';
      qrHtml += ' padding: 0px; margin: ' + margin + 'px;';
      qrHtml += '">';
      qrHtml += '<tbody>';

      for (var r = 0; r < _this.getModuleCount(); r += 1) {

        qrHtml += '<tr>';

        for (var c = 0; c < _this.getModuleCount(); c += 1) {
          qrHtml += '<td style="';
          qrHtml += ' border-width: 0px; border-style: none;';
          qrHtml += ' border-collapse: collapse;';
          qrHtml += ' padding: 0px; margin: 0px;';
          qrHtml += ' width: ' + cellSize + 'px;';
          qrHtml += ' height: ' + cellSize + 'px;';
          qrHtml += ' background-color: ';
          qrHtml += _this.isDark(r, c)? '#000000' : '#ffffff';

      img += '\u0020width="';

      img += '\u0020height="';

        formatBytes(woven.length) +
        " / 共 " +
        total +
        " 片";
      refreshMending();
      nodes.focus.disabled = false;
      nodes.mendingPanel.hidden = true;
      updateSetupSummary();
      nodes.play.textContent = "开始";
      setStatus("可以开始");
      setFlow("play", ["choose"]);
      setCycle("wait", [], "准备完成，可以点击开始");
    } catch (error) {
      console.error(error);
      setStatus("准备失败，请调小单片容量");
    }
  }

  nodes.file.addEventListener("change", function () {
    startLamp();
    prepareToken += 1;
    runtimeMode = false;
    chosenPattern = nodes.file.files && nodes.file.files[0] ? nodes.file.files[0] : null;
    skein = [];
    stitchOrder = [];
    stopLoop();
    setRuntimeControls(false);
    nodes.name.textContent = chosenPattern ? chosenPattern.name : "等待选择文件";
    nodes.details.textContent = chosenPattern ? formatBytes(chosenPattern.size) : "选择后显示文件信息";
    nodes.play.disabled = true;
    nodes.focus.disabled = true;
    nodes.mendingPanel.hidden = true;
    nodes.count.textContent = "0";
    nodes.current.textContent = "0";
    nodes.lap.textContent = "0";
    nodes.playState.textContent = "等待";
    nodes.mending.value = "";
    nodes.mendingCount.textContent = "当前播放全部片段";
    updateSetupSummary();
    setStatus(chosenPattern ? "正在准备" : "等待选择");
    setFlow("choose", []);
    setCycle("wait", [], chosenPattern ? "自动准备中" : "等待选择文件");
    if (chosenPattern) schedulePrepare(0);
  });

  nodes.play.addEventListener("click", function () {
    startLamp();
    if (playing) {
      stopLoop();
      return;
    }
    if (!runtimeMode) {
      runtimeMode = true;
      setRuntimeControls(true);
      nodes.mendingPanel.hidden = false;
    }
    startLoop();
  });
  nodes.focus.addEventListener("click", async function () {
    if (!skein.length || !nodes.stage.requestFullscreen) return;
    await nodes.stage.requestFullscreen();
  });
  document.addEventListener("fullscreenchange", function () {
    nodes.focus.textContent = document.fullscreenElement ? "已放大" : "放大画面";
  });
  nodes.presetDown.addEventListener("click", function () {
    stepPreset(-1);
  });
  nodes.presetUp.addEventListener("click", function () {
    stepPreset(1);
  });
  nodes.rhythm.addEventListener("input", function () {
    updateSetupSummary();
    if (runtimeMode && playing) startLoop();
    if (chosenPattern && !runtimeMode) schedulePrepare();
  });
  nodes.rhythmDown.addEventListener("click", function () {
    stepRange(nodes.rhythm, -1);
  });
  nodes.rhythmUp.addEventListener("click", function () {
    stepRange(nodes.rhythm, 1);
  });
  nodes.size.addEventListener("input", function () {
    updateSetupSummary();
    if (skein.length) showStitch(stitchIndex);
    if (chosenPattern && !runtimeMode) schedulePrepare();
  });
  nodes.sizeDown.addEventListener("click", function () {
    stepRange(nodes.size, -1);
  });
  nodes.sizeUp.addEventListener("click", function () {
    stepRange(nodes.size, 1);
  });
  nodes.chunk.addEventListener("input", function () {
    updateSetupSummary();
    if (runtimeMode) return;
    if (chosenPattern) resetPreparedState();
  });
  nodes.chunkDown.addEventListener("click", function () {
    stepRange(nodes.chunk, -1);
  });
  nodes.chunkUp.addEventListener("click", function () {
    stepRange(nodes.chunk, 1);
  });
  nodes.mending.addEventListener("input", function () {
    var wasPlaying = playing;
    stopLoop();
    refreshMending();
    if (skein.length) {
      setStatus(nodes.mending.value.trim() ? "补洞内容已填入" : "已切回全部片段");
      setFlow(nodes.mending.value.trim() ? "loop" : "play", nodes.mending.value.trim() ? ["choose", "play"] : ["choose"]);
      setCycle(nodes.mending.value.trim() ? "paste" : "wait", nodes.mending.value.trim() ? ["wait"] : [], nodes.mending.value.trim() ? "已收到短码，直接播放补洞" : "首轮完成后等待扫描端短码");
    }
    if (wasPlaying) startLoop();
  });

  setFlow("choose", []);
  setCycle("wait", [], "等待选择文件");
  setRuntimeControls(false);
  updateSetupSummary();
})();
</script>
  </body>
</html>
